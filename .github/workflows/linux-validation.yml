name: Linux validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install validation tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq
          if sudo apt-get install -y shellcheck; then
            echo "shellcheck_available=1" >> "$GITHUB_ENV"
          else
            echo "::warning::shellcheck is not available from apt; skipping ShellCheck."
            echo "shellcheck_available=0" >> "$GITHUB_ENV"
          fi

      - name: Bash syntax
        run: |
          set -euo pipefail
          mapfile -t shell_files < <(git ls-files '*.sh')
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "No shell scripts found."
            exit 0
          fi
          bash -n "${shell_files[@]}"

      - name: Reviewer fixtures
        run: bash scripts/reviewer/tests/run-fixtures.sh

      - name: App token helper smoke test
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          export REVIEWER_APP_ID=12345
          export REVIEWER_APP_INSTALLATION_ID=67890
          export REVIEWER_STATE="$tmp/state"
          export REVIEWER_APP_PRIVATE_KEY_PATH="$tmp/key.pem"
          mkdir -p "$REVIEWER_STATE"
          openssl genrsa -out "$REVIEWER_APP_PRIVATE_KEY_PATH" 2048
          # Serve a far-future cached token/slug without any network call.
          jq -nc --argjson e "$(( $(date +%s) + 3600 ))" \
            '{app_id:"12345",installation_id:"67890",slug:"goob-bot",token:"ghs_SMOKE",expires_at:$e}' \
            > "$REVIEWER_STATE/app_token.json"
          [ "$(scripts/reviewer/get-installation-token.sh token)" = "ghs_SMOKE" ]
          [ "$(scripts/reviewer/get-installation-token.sh slug)" = "goob-bot" ]
          # Unknown query must exit non-zero.
          if scripts/reviewer/get-installation-token.sh bogus 2>/dev/null; then
            echo "expected non-zero exit for unknown query" >&2
            exit 1
          fi

      - name: Register server smoke test
        run: |
          set -euo pipefail
          # No --repo: auto-detect the single installed repo.
          node scripts/lib/tests/register-server.test.mjs
          # --repo: detection is constrained to the requested repo.
          GOOBREVIEW_TARGET_REPO=someuser/their-repo GOOBREVIEW_REGISTER_PORT=8772 \
            node scripts/lib/tests/register-server.test.mjs

      - name: Preflight fixtures
        run: bash scripts/preflight/tests/run-fixtures.sh

      - name: JSON validation
        run: |
          set -euo pipefail
          mapfile -t json_files < <(git ls-files '*.json')
          if [ "${#json_files[@]}" -eq 0 ]; then
            echo "No JSON files found."
            exit 0
          fi
          for file in "${json_files[@]}"; do
            jq -e . "$file" >/dev/null
          done

      - name: Template cleanup coverage
        run: |
          set -euo pipefail
          mapfile -t files < <(git grep -l 'asavschaeffer/goobreview' -- . || true)
          printf '%s\n' "${files[@]}" | grep -Fxq 'config/app-manifest.json'
          printf '%s\n' "${files[@]}" | grep -Fxq 'deploy/systemd/goobreview.service.example'
          printf '%s\n' "${files[@]}" | grep -Fxq 'deploy/systemd/goobreview.timer.example'

      - name: ShellCheck
        if: env.shellcheck_available == '1'
        run: |
          set -euo pipefail
          mapfile -t shell_files < <(git ls-files '*.sh')
          shellcheck "${shell_files[@]}"

      - name: Whitespace
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}" HEAD
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            git diff-tree --check --no-commit-id --root -r HEAD
          else
            git diff --check "${{ github.event.before }}" HEAD
          fi
